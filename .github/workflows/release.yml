name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-darwin-arm64:
    name: Build macOS ARM64
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build native libraries
        run: ./scripts/build-platform.sh packages/bun-llama-cpp-darwin-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: packages/bun-llama-cpp-darwin-arm64/*.dylib

  publish:
    name: Publish to npm
    needs: [build-darwin-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download darwin-arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: packages/bun-llama-cpp-darwin-arm64/

      - name: Publish platform package (darwin-arm64)
        working-directory: packages/bun-llama-cpp-darwin-arm64
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Publish main package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
