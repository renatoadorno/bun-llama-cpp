name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    outputs:
      is-on-main: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          git fetch origin main
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "Tag is not reachable from main — skipping release."
            echo "result=false" >> $GITHUB_OUTPUT
          fi

  build-darwin-arm64:
    name: Build macOS ARM64
    needs: check-on-main
    if: needs.check-on-main.outputs.is-on-main == 'true'
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build native libraries
        run: ./scripts/build-platform.sh packages/bun-llama-cpp-darwin-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: packages/bun-llama-cpp-darwin-arm64/*.dylib

  publish:
    name: Publish to GitHub Packages
    needs: [check-on-main, build-darwin-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@renatoadorno'

      - name: Download darwin-arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: darwin-arm64-binaries
          path: packages/bun-llama-cpp-darwin-arm64/

      - name: Publish platform package (darwin-arm64)
        working-directory: packages/bun-llama-cpp-darwin-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Publish main package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
